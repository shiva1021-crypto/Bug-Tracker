{% extends "base.html" %}
{% block title %}Log In · Bug Tracker{% endblock %}
{% block main_class %}auth-shell{% endblock %}

{% block content %}
<div class="auth-wrap">

  <div class="auth-logo">
    <span class="brand-mark brand-mark-lg" aria-hidden="true">BT</span>
    <h1 class="auth-logo-name">Bug Tracker</h1>
  </div>

  {% include "partials/flashes.html" %}

  <div class="card auth-card">
    <h2 class="auth-title">Log in to your account</h2>

    <form method="post" action="{{ url_for('auth.login') }}" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="field">
        <label class="label" for="email">Email</label>
        <input class="input" type="email" id="email" name="email"
               value="{{ email or '' }}" autocomplete="email" required autofocus>
      </div>

      <div class="field">
        <label class="label" for="password">Password</label>
        <input class="input" type="password" id="password" name="password"
               autocomplete="current-password" required>
      </div>

      <button type="submit" class="btn btn-primary btn-block">Log In</button>
    </form>
  </div>

  <p class="auth-alt">
    Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a>.
  </p>

</div>
{% endblock %}
