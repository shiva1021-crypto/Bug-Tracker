<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Bug Tracker{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <header class="app-header">
    <div class="header-left">
      {% if current_user %}
        <button type="button" class="sidebar-toggle" data-sidebar-toggle
                aria-label="Toggle navigation" aria-expanded="true">
          <span class="sidebar-toggle-bar"></span>
          <span class="sidebar-toggle-bar"></span>
          <span class="sidebar-toggle-bar"></span>
        </button>
      {% endif %}
      <a class="brand" href="{{ url_for('auth.profile') if current_user else url_for('auth.login') }}">
        <span class="brand-mark" aria-hidden="true">BT</span>
        <span class="brand-name">Bug Tracker</span>
      </a>
    </div>

    <nav class="header-nav">
      {% if current_user %}
        <div class="user-menu" data-user-menu>
          <button type="button" class="user-menu-trigger" data-user-menu-trigger
                  aria-haspopup="true" aria-expanded="false">
            <span class="avatar" aria-hidden="true">{{ current_user.full_name[:1] | upper }}</span>
            <span class="user-menu-name">{{ current_user.full_name }}</span>
            <span class="caret" aria-hidden="true"></span>
          </button>
          <div class="user-menu-dropdown" data-user-menu-dropdown hidden>
            <a class="dropdown-item" href="{{ url_for('auth.profile') }}">Profile</a>
            <form method="post" action="{{ url_for('auth.logout') }}">
              <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
              <button type="submit" class="dropdown-item dropdown-item-button">Log Out</button>
            </form>
          </div>
        </div>
      {% else %}
        <a class="nav-link" href="{{ url_for('auth.login') }}">Log In</a>
        <a class="nav-link nav-link-primary" href="{{ url_for('auth.register') }}">Register</a>
      {% endif %}
    </nav>
  </header>

  <!-- Blocks can only be defined once per template, so the sidebar's
       presence is a conditional *inside* a single shell rather than two
       branches that each redefine main_class/content. -->
  <div class="app-shell {{ '' if current_user else 'no-sidebar' }}" data-app-shell>
    {% if current_user %}
      <aside class="sidebar" data-sidebar>
        <nav class="sidebar-nav">
          <a class="sidebar-link {{ 'sidebar-link-active' if request.endpoint in ('projects.list_projects', 'projects.project_detail') else '' }}"
             href="{{ url_for('projects.list_projects') }}">Projects</a>
          {% if current_user.role == 'admin' %}
            <a class="sidebar-link {{ 'sidebar-link-active' if request.endpoint == 'admin.users_page' else '' }}"
               href="{{ url_for('admin.users_page') }}">Users</a>
          {% endif %}
        </nav>
      </aside>
    {% endif %}
    <main class="app-main {% block main_class %}{% endblock %}">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
