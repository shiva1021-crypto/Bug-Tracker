{% extends "base.html" %}
{% block title %}Bug Tracker · Track issues, ship faster{% endblock %}
{% block main_class %}landing-shell{% endblock %}

{% block content %}
<div class="landing-hero">
  <span class="brand-mark brand-mark-lg" aria-hidden="true">BT</span>
  <h1 class="landing-title">Bug Tracker</h1>
  <p class="landing-tagline">Track bugs, plan sprints, and ship with your team - all in one place.</p>

  <div class="landing-actions">
    <a class="btn btn-primary btn-lg" href="{{ url_for('auth.login') }}">Log In</a>
    <a class="btn btn-secondary btn-lg" href="{{ url_for('auth.register') }}">Register</a>
  </div>
</div>
{% endblock %}
